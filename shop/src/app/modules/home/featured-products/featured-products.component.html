<section class="featured">
  <div class="featured__header">
    <p class="eyebrow">Trending</p>
    <h2>Featured Products</h2>
    <p>Curated essentials to elevate your daily glow routine.</p>
  </div>

  <div *ngIf="isLoading" class="loading">Loading products...</div>

  <div *ngFor="let category of featuredCategories" class="featured__category">
    <h3 class="category-title">{{ category.category }}</h3>

    <div class="product-grid">
      <article class="product-card" *ngFor="let product of category.products | slice:0:2">
        <div class="product-image">
          <img [src]="product.imageUrl" [alt]="product.name" />
        </div>

        <div class="product-info">
          <h4>{{ product.name }}</h4>
          <p class="price">KES {{ product.price }}</p>
          <button class="add-btn"><i class="fa-duotone fa-regular fa-cart-circle-plus"></i> Add to Cart</button>
        </div>
      </article>
    </div>
  </div>
</section>
