<section class="hero" [ngStyle]="{'background-image': 'url(' + currentHeroImage + ')'}">
  <div class="hero__veil"></div>

  <div class="hero__content">
    <p class="hero__eyebrow">Wellness and Beauty</p>
    <h1 class="hero__title">Glow Naturally.<br />Feel Beautiful.</h1>
    <p class="hero__subtitle">
      Discover premium essentials designed for healthy skin, stronger hair, and everyday confidence.
    </p>
    <div class="hero__actions">
      <button class="btn-primary">Shop Now</button>
      <button class="btn-secondary">Explore Products</button>
    </div>
  </div>

  <div class="hero__floating-card">
    <p>Beauty and Health</p>
    <h3>Botanical Care Collection</h3>
    <span>Small-batch picks curated for your routine.</span>
  </div>
</section>
