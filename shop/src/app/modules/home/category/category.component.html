<section class="categories">
  <div class="categories__header">
    <h2>Shop by Category</h2>
    <p>Explore curated picks for every part of your beauty and wellness routine.</p>
  </div>

  <ng-container *ngIf="isBrowser">
    <div class="categories__carousel">
      <button class="carousel-btn prev" (click)="prevSlide()">&#10094;</button>

      <div class="carousel-track-wrapper">
        <div class="carousel-track" #track>
          <article class="category-card" *ngFor="let category of infiniteCategories">
            <div class="image-container">
              <img
                [ngSrc]="category.image"
                [alt]="category.name"
                width="220"
                height="220"
                priority
              />
              <div class="overlay">
                <button class="btn-primary">Shop Now</button>
              </div>
            </div>
            <h3 class="category-title">{{ category.name }}</h3>
          </article>
        </div>
      </div>

      <button class="carousel-btn next" (click)="nextSlide()">&#10095;</button>
    </div>
  </ng-container>
</section>
